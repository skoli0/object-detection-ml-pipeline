version: "3.9"
# Image pins refreshed periodically; upgrading Postgres major may require `make infra-clean`
# (wiping volumes) if the existing data directory is incompatible.
services:
  postgres:
    image: docker.io/postgres:17-alpine
    container_name: mlops-postgres
    environment:
      POSTGRES_USER: mlops
      POSTGRES_PASSWORD: mlops
      POSTGRES_DB: mlflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: mlops-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  mlflow:
    # `-full` includes Postgres + S3 extras; see https://github.com/mlflow/mlflow/blob/master/docker/README.md
    image: ghcr.io/mlflow/mlflow:v3.12.0-full
    container_name: mlops-mlflow
    depends_on:
      - postgres
      - minio
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minio
      AWS_SECRET_ACCESS_KEY: minio123
      GUNICORN_CMD_ARGS: --bind 0.0.0.0:5000
    command:
      - mlflow
      - server
      - --backend-store-uri
      - postgresql://mlops:mlops@postgres:5432/mlflow
      - --default-artifact-root
      - s3://mlflow/
      - --host
      - "0.0.0.0"
      - --port
      - "5000"
    # Host <- container:5000. Default 5000: macOS often binds TCP 5000 (Air Play Receiver).
    ports:
      - "${MLFLOW_PORT:-5000}:5000"

  prefect:
    # Match the Python client's major (3.x); older 2.x server + 3.x client yields an empty UI.
    image: docker.io/prefecthq/prefect:3.7.0-python3.12
    container_name: mlops-prefect
    command: prefect server start --host 0.0.0.0
    volumes:
      - prefect_data:/root/.prefect
    ports:
      - "4200:4200"

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v25.3.11
    container_name: mlops-redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "512M"
      - --reserve-memory
      - "0M"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://localhost:9092
    ports:
      - "9092:9092"

volumes:
  postgres_data:
  minio_data:
  prefect_data:
