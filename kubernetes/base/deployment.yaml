apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlops-api
  namespace: mlops-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlops-api
      version: stable
  template:
    metadata:
      labels:
        app: mlops-api
        version: stable
    spec:
      containers:
      - name: api
        image: localhost/mlops-api:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
